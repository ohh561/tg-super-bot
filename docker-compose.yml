services:
  # Telegram Bot API Server (本地部署，支持最大 2GB 文件)
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - default

  # TG Super Bot
  tg-super-bot:
    build: .
    container_name: tg-super-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ALLOWED_USER_ID: ${ALLOWED_USER_ID}
      ALIST_WEBDAV_CRYPT: ${ALIST_WEBDAV_CRYPT}
      ALIST_WEBDAV_DIRECT: ${ALIST_WEBDAV_DIRECT}
      ALIST_USER: ${ALIST_USER}
      ALIST_PASS: ${ALIST_PASS}
      ALIST_API_URL: ${ALIST_API_URL:-http://openlist:5244}
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    depends_on:
      - telegram-bot-api
    networks:
      - default
      - ubuntu_default

volumes:
  telegram-bot-api-data:

networks:
  default:
    driver: bridge
  ubuntu_default:
    external: true
